<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>匯率換算</title>
  <link rel="stylesheet" href="style.css">
  <link rel="manifest" href="manifest.json">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="匯率換算">
  <link rel="icon" href="icon.png" type="image/png">
  <link rel="apple-touch-icon" href="icon.png">
  <meta name="theme-color" content="#16213e">
</head>
<body>
  <div class="bg-gradient">
    <main class="container">
      <header>
        <button id="refresh-btn"><h1>匯率換算</h1></button>
        <span id="update-time" class="update-time"></span>
      </header>

      <!-- 輸入區 -->
      <div class="input-card">
        <div class="input-row">
          <input
            type="number"
            id="amount-input"
            placeholder="輸入金額"
            min="0"
            step="any"
            value="1"
            autocomplete="off"
          >
          <select id="base-currency" aria-label="基準貨幣"></select>
        </div>
      </div>

      <!-- 錯誤提示 -->
      <div class="error-banner" id="error-banner" hidden>
        <span>⚠</span> <span id="error-message">無法取得最新匯率，請檢查網路連線後重試</span>
      </div>

      <!-- 多幣種結果列表 -->
      <div class="results-card" id="results-card">
        <div class="results-list" id="results-list">
          <!-- 由 JS 動態產生 -->
        </div>
      </div>

      <div class="tagline">敢花錢的人先享受世界🤩</div>
    </main>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <!-- 歷史圖表 Modal -->
  <div class="chart-modal" id="chart-modal" hidden>
    <div class="chart-modal-overlay" id="chart-modal-overlay"></div>
    <div class="chart-modal-box">
      <button class="chart-modal-close" id="chart-modal-close" aria-label="關閉">×</button>
      <h2 class="chart-modal-title" id="chart-title"></h2>
      <div class="chart-loading" id="chart-loading">載入中…</div>
      <div class="chart-canvas-wrap" id="chart-canvas-wrap" hidden>
        <canvas id="history-chart"></canvas>
      </div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
